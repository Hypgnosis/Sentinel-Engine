# ═══════════════════════════════════════════════════════
#  SENTINEL ENGINE — API GATEWAY CONFIGURATION
#  Google Cloud API Gateway OpenAPI 2.0 Config
# ═══════════════════════════════════════════════════════
#
#  This config deploys an API Gateway in front of the
#  Cloud Run sentinelInference function. It provides:
#    - Request routing to Cloud Run backend
#    - Usage quota enforcement (10,000 req/month base tier)
#    - CORS passthrough (handled by the Cloud Function)
#
#  Deploy via: infra/api-gateway.sh
#
#  © High ArchyTech Solutions — Sentinel Engine v4.0
# ═══════════════════════════════════════════════════════

swagger: '2.0'
info:
  title: Sentinel Engine API Gateway
  version: '4.1.0'
  description: >
    Enterprise API Gateway for Sentinel Engine sovereign intelligence layer.
    Routes to Cloud Run backend with quota management.

host: gateway.sentinel-engine.tech
basePath: /v4
schemes:
  - https

# ─────────────────────────────────────────────────────
#  BACKEND ROUTING
# ─────────────────────────────────────────────────────

x-google-backend:
  address: https://sentinelinference-XXXXXXXXXX-uc.a.run.app
  protocol: h2
  deadline: 300.0

# ─────────────────────────────────────────────────────
#  QUOTA MANAGEMENT
# ─────────────────────────────────────────────────────

x-google-management:
  metrics:
    - name: sentinel-inference-requests
      displayName: Sentinel Inference Requests
      valueType: INT64
      metricKind: DELTA
  quota:
    limits:
      - name: sentinel-monthly-limit
        metric: sentinel-inference-requests
        unit: 1/min/{project}
        values:
          STANDARD: 350
        # 350 req/min ≈ 10,000 req/month at sustained usage
        # Burst allowance: up to 350 in any single minute
        # For strict monthly enforcement, use Cloud Endpoints + API keys

# ─────────────────────────────────────────────────────
#  PATHS
# ─────────────────────────────────────────────────────

paths:
  /inference:
    post:
      operationId: sentinelInference
      summary: Execute logistics intelligence query
      description: >
        Proxies the request to the Sentinel Engine Cloud Run backend.
        Authentication is handled by the backend (Firebase JWT verification).
        Rate limiting is applied at both gateway and backend levels.
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required:
              - query
            properties:
              query:
                type: string
                description: Natural language logistics query
      responses:
        '200':
          description: Structured intelligence response
        '400':
          description: Bad request — empty or missing query
        '401':
          description: Unauthorized — missing or invalid token
        '403':
          description: Forbidden — tenant not provisioned
        '429':
          description: Rate limit exceeded
        '503':
          description: Infrastructure data unavailable
      x-google-quota:
        metricCosts:
          sentinel-inference-requests: 1

    options:
      operationId: sentinelInferencePreflight
      summary: CORS preflight handler
      description: >
        Handles browser CORS preflight requests.
        Proxied to backend which returns appropriate headers.
      responses:
        '204':
          description: No content (CORS headers set by backend)
